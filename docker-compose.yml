services:
  app:
    build: .
    container_name: laravel
    volumes:
      - ./laravel:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8081:80"
    volumes:
      - ./laravel:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_DATABASE: portfolio
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"

  node:
    image: node:22
    container_name: node
    working_dir: /var/www
    ports:
      - "5173:5173"
    volumes:
      - ./laravel:/var/www
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - app
